version: '3.8'

services:
  task1-server:
    build:
      context: .
      dockerfile: Dockerfile.task1
    ports:
      - "9999:9999"
    networks:
      - jpmc-network
    container_name: jpmc-task1

  task2-server:
    build:
      context: .
      dockerfile: Dockerfile.task2
    ports:
      - "8081:8080"
    networks:
      - jpmc-network
    container_name: jpmc-task2
    depends_on:
      - task1-server

  task3-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.task3
    ports:
      - "8082:8080"
    networks:
      - jpmc-network
    container_name: jpmc-task3
    depends_on:
      - task1-server

networks:
  jpmc-network:
    driver: bridge
