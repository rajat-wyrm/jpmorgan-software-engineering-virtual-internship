version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - transaction-network

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - transaction-network

  transaction-app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INCENTIVE_API_URL: http://incentive-api:8081/v1/calculate
    networks:
      - transaction-network

  incentive-api:
    image: mockoon/cli:latest
    command: --data https://raw.githubusercontent.com/rajat-wyrm/jpmorgan-software-engineering-virtual-internship/main/mock-api.json
    ports:
      - "8081:8081"
    networks:
      - transaction-network

networks:
  transaction-network:
    driver: bridge
